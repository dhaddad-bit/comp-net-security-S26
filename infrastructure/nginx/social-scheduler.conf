server {
    listen 80;
    listen [::]:80;
    server_name social-scheduler.me www.social-scheduler.me 165.232.143.225.sslip.io;

    root /var/www/comp-net-security-S26/frontend/dist;
    index index.html;

    # Basic hardening headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # --- Backend proxies (must appear before the SPA catch-all). ---

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth callback is a backend route, not a frontend route.
    location = /oauth2callback {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Express defines /health (not /api/health), so proxy it explicitly.
    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static legal pages: extensionless URLs → .html files. ---
    # Explicit exact-match blocks are clearer than relying on $uri.html
    # ordering inside the SPA try_files chain.
    location = /privacy { try_files /privacy.html =404; }
    location = /tos     { try_files /tos.html     =404; }

    # --- SPA ---

    # Never cache the app shell. Hashed assets under /assets/ remain cacheable
    # by their filename; this rule only targets index.html so SPA deploys
    # take effect on the next navigation instead of being pinned to a stale
    # bundle in the browser cache.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
